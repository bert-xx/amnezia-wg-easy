name: Build and Push Multi-Platform Docker Image

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # Позволяет запускать сборку вручную одной кнопкой

env:
  REGISTRY: ghcr.io
  # Имя образа будет соответствовать вашему репозиторию на гитхабе
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Настройка QEMU для эмуляции ARM64 на серверах GitHub (они работают на amd64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Настройка сборщика Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Авторизация в GitHub Container Registry (GHCR)
      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Извлечение тегов и метаданных
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      # Сборка под две платформы (x86_64 и ARM64) и пуш в реестр
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
